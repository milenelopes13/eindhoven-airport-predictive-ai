<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eindhoven Airport Predictive AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
<h1>2. New passenger group predictor</h1>
<p>Enter a new passenger profile and the AI predicts the most likely customer group.</p>

<div class="predictor">
<div class="form">

<label>Age of passenger</label>
<input id="age" type="number" value="30">

<label>Travel purpose</label>
<select id="purpose">
<option>Business trip</option>
<option>Holiday / leisure</option>
<option>Family trip</option>
</select>

<label>Travel frequency</label>
<select id="frequency">
<option>Frequent traveller</option>
<option>Occasional traveller</option>
<option>First-time traveller</option>
</select>

<label>Average spend in airport stores (€)</label>
<input id="spend" type="number" value="25">

<label>Purchase frequency (number of purchases)</label>
<input id="purchase" type="number" value="1">

<label>Passenger satisfaction score (/5)</label>
<input id="satisfaction" type="number" step="0.1" value="4.0">

<label>Staff service score (/5)</label>
<input id="staff" type="number" step="0.1" value="4.1">

<label>Complaint likelihood (%)</label>
<input id="complaint" type="number" value="10">

<button onclick="predict()">Run prediction</button>
</div>

<div class="result">
<h3>PREDICTED CUSTOMER GROUP</h3>
<h2 id="group">High-Value Passenger</h2>
<div class="bar"><div id="fill"></div></div>
<p><b id="chance">75%</b> likelihood</p>
<p id="explanation"></p>
</div>
</div>

<div class="card">
<h2>3. Likelihood breakdown</h2>
<p id="breakdown"></p>
</div>

<div class="card">
<h2>4. Marketing recommendation engine</h2>
<p id="recommendation"></p>
</div>

</div>
<script src="script.js"></script>
</body>
</html>
